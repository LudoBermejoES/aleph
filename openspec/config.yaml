schema: spec-driven

context: |
  Project: Aleph - A TTRPG Campaign Management Suite (named after the Borges short story)
  Tech stack: Nuxt 4 (Vue 3, Vite, Nitro), SQLite (via Drizzle ORM), better-auth, Hocuspocus (real-time collaboration), Tailwind CSS, shadcn-vue
  Architecture: Full-stack Nuxt app — pages and components in app/, server API routes in server/api/, DB schema in server/db/schema/, migrations in server/db/migrations/
  Domain: Tabletop RPG campaign management — entities/wiki, characters, sessions, quests, maps, calendars, timelines, relations, inventories, shops, currencies
  Auth: better-auth with email/password; role-based access (dm, co_dm, editor, player, visitor) enforced per campaign
  Testing: Vitest for unit + integration tests, Playwright for E2E; integration tests require a running server on port 3333
  CLI: The project includes aleph-cli (cli/ directory) — a Node.js CLI tool for managing Aleph from the terminal. Any change that adds or modifies server API endpoints, auth flows, or data models must be assessed for CLI impact and updated accordingly (commands, client.js, config.js, login/logout flows).
  Phase: Active development — core features implemented, iterating on polish, performance, and new features

rules:
  proposal:
    - Focus on the problem being solved and why it matters for the existing codebase
    - Identify which files and areas are affected
    - Assess whether the change affects aleph-cli (new/modified API endpoints, auth, data models) and call it out explicitly in the Impact section
  specs:
    - Use Given/When/Then format for scenarios
    - Include role-based permission context where relevant
    - Reference existing API routes or components when describing behaviour
    - Each scenario is a potential test case — write them so they can be directly translated into unit, integration, or E2E tests
    - If the capability involves a server API endpoint, include scenarios for both authenticated (valid key/session) and unauthenticated requests
  tasks:
    - Tasks should be concrete and implementable — each maps to specific file changes
    - Order tasks so foundational work (types, composables, utilities) comes before consumers
    - Every change MUST include a testing group with unit tests (Vitest), integration tests (Vitest + running server), and E2E tests (Playwright) where applicable — skip a level only if there is a clear reason (e.g. pure UI with no logic = no unit test needed)
    - If the change affects any server API endpoint, auth flow, or data model, include tasks to update: (1) aleph-cli commands in cli/src/commands/, (2) docs/claude-skill.md (shareable skill, uses "aleph"/"npx aleph-cli"), (3) .claude/skills/aleph-cli/SKILL.md (local skill, uses "node .../cli/bin/aleph.js", bump version in frontmatter) — both skill files must always be updated together
    - Verification tasks (build, test, lint) should be the final group
