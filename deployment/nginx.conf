# Aleph — Nginx reverse proxy
# Install: cp deployment/nginx.conf /etc/nginx/sites-available/aleph
#          ln -s /etc/nginx/sites-available/aleph /etc/nginx/sites-enabled/
#          nginx -t && systemctl reload nginx

# HTTP → HTTPS redirect
server {
    listen 80;
    server_name aleph.ludobermejo.es;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name aleph.ludobermejo.es;

    # SSL — Let's Encrypt (managed by Certbot)
    ssl_certificate /etc/letsencrypt/live/aleph.ludobermejo.es/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/aleph.ludobermejo.es/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;

    # Security headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Proxy to Node.js/PM2
    location / {
        proxy_pass http://localhost:3033;
        proxy_http_version 1.1;

        # WebSocket support (Hocuspocus real-time collaboration)
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_read_timeout 300s;
        proxy_connect_timeout 75s;
    }

    # Health check — no access log noise
    location /api/health {
        proxy_pass http://localhost:3033;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        access_log off;
    }

    # Block hidden files
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}
